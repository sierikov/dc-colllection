services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:2.32.1
    container_name: audiobooks
    ports:
      - 3019:80
    volumes:
      - ~/dc-storage/audiobookshelf/audiobooks:/audiobooks
      - ~/dc-storage/audiobookshelf/books:/books
      - ~/dc-storage/audiobookshelf/podcasts:/podcasts
      - ~/dc-storage/audiobookshelf/config:/config
      - ~/dc-storage/audiobookshelf/metadata:/metadata
    environment:
      - TZ=Europe/Berlin

  shelfmark:
    image: ghcr.io/calibrain/shelfmark:1.1.2
    container_name: shelfmark
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - USING_TOR=true
      - FLASK_PORT=8084
      - CWA_INGEST_PATH=/cwa-book-ingest
      - CALIBRE_WEB_URL=https://audiobooks.b0xy.xyz
      - BOOK_LANGUAGE=en,de,uk,ru
    volumes:
      - ~/dc-storage/audiobookshelf/books:/cwa-book-ingest
      - ~/dc-storage/audiobookshelf/audiobooks:/audiobooks
    ports:
      - "3017:8084"
    restart: unless-stopped
