name: Validate

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    container:
      image: docker:27.5.1-cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python and yamllint
        run: |
          apk add --no-cache python3 py3-pip
          pip3 install yamllint --break-system-packages

      - name: Lint YAML files
        run: yamllint --strict .

      - name: Validate compose files
        run: |
          for f in $(find . -name "*.yml" -o -name "*.yaml" | \
            grep -v ".git" | grep -v "provisioning" | \
            grep -v "prometheus/prometheus.yml"); do
            echo "Validating: $f"
            docker compose -f "$f" config --quiet 2>&1 | \
              grep -v -e "env file.*not found" || true
          done
