name: Validate

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    container:
      image: pipelinecomponents/yamllint:0.31.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint YAML files
        run: yamllint --strict .

  validate-compose:
    runs-on: ubuntu-latest
    container:
      image: docker:27.5.1-cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose files
        run: |
          find . -name "*.yml" -o -name "*.yaml" \
            | grep -v ".git" \
            | grep -v "provisioning" \
            | grep -v "prometheus/prometheus.yml" \
            | while read -r f; do
            echo "Validating: $f"
            docker compose -f "$f" config --quiet 2>&1 \
              | grep -v -e "env file.*not found" || true
          done
